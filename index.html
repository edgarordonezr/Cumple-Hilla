<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz cumpleaños 🌷</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500;1,9..144,600&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FBF3E7;
    --paper:#FFFDF9;
    --yellow:#F3D48A;
    --yellow-deep:#E3B65C;
    --lavender:#8C7FCB;
    --lavender-deep:#6C5CA8;
    --coral:#E8837D;
    --coral-deep:#D5645C;
    --green:#4B7952;
    --ink:#3E362C;
    --ink-soft:#7A6F60;
    --shadow: 0 20px 45px -20px rgba(62,54,44,0.35);
  }

  *{box-sizing:border-box;}

  html,body{
    margin:0;
    padding:0;
    min-height:100%;
    background:
      radial-gradient(circle at 20% 10%, rgba(243,212,138,0.35), transparent 55%),
      radial-gradient(circle at 85% 85%, rgba(140,127,203,0.22), transparent 50%),
      var(--cream);
    color:var(--ink);
    font-family:'Quicksand', sans-serif;
  }

  body{
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:48px 20px 80px;
  }

  .eyebrow{
    font-family:'Quicksand', sans-serif;
    font-weight:600;
    letter-spacing:0.22em;
    text-transform:uppercase;
    font-size:12px;
    color:var(--coral-deep);
    margin-bottom:10px;
  }

  h1{
    font-family:'Fraunces', serif;
    font-style:italic;
    font-weight:500;
    font-size:clamp(2.1rem, 6vw, 3.4rem);
    margin:0 0 10px;
    text-align:center;
    color:var(--ink);
    line-height:1.05;
  }

  .subtitle{
    max-width:420px;
    text-align:center;
    color:var(--ink-soft);
    font-size:15px;
    line-height:1.5;
    margin:0 0 34px;
  }

  .subtitle strong{ color:var(--ink); font-weight:600; }

  /* ---------- Progress dots ---------- */
  .progress{
    display:flex;
    gap:10px;
    margin-bottom:26px;
  }
  .progress .dot{
    width:11px;
    height:11px;
    border-radius:50%;
    background:rgba(140,127,203,0.25);
    border:1.5px solid rgba(140,127,203,0.5);
    transition:transform .35s ease, background .35s ease, border-color .35s ease;
  }
  .progress .dot.filled{
    background:var(--lavender);
    border-color:var(--lavender-deep);
    transform:scale(1.15);
  }

  /* ---------- Bouquet stage ---------- */
  .stage{
    position:relative;
    width:100%;
    max-width:420px;
    aspect-ratio:801/1024;
  }

  .stage img{
    width:100%;
    height:100%;
    display:block;
    object-fit:contain;
    filter:drop-shadow(0 25px 30px rgba(62,54,44,0.18));
    user-select:none;
    -webkit-user-drag:none;
    pointer-events:none;
  }

  .hotspot{
    position:absolute;
    width:17%;
    aspect-ratio:1/1;
    transform:translate(-50%,-50%);
    border:none;
    background:transparent;
    cursor:pointer;
    border-radius:50%;
    -webkit-tap-highlight-color: transparent;
  }

  .hotspot .ring{
    position:absolute;
    inset:0;
    border-radius:50%;
    box-shadow:0 0 0 2px rgba(255,255,255,0.0);
  }

  /* "Peephole": a live crop of the same bouquet image, pixel-aligned
     over the flower, so it can be lifted/scaled to look like the
     rose leaning forward without disturbing the rest of the artwork */
  .peephole{
    position:absolute;
    inset:0;
    border-radius:50%;
    background-repeat:no-repeat;
    -webkit-mask-image:radial-gradient(circle, #000 55%, transparent 78%);
    mask-image:radial-gradient(circle, #000 55%, transparent 78%);
    transform:translateY(0) scale(1);
    transition:transform .5s cubic-bezier(.34,1.56,.64,1), filter .5s ease;
    filter:drop-shadow(0 0 0 rgba(0,0,0,0));
    pointer-events:none;
  }

  .hotspot.lifted .peephole{
    transform:translateY(-9%) scale(1.26) rotate(-2deg);
    filter:drop-shadow(0 12px 16px rgba(62,54,44,0.35));
  }

  .hotspot .glow{
    position:absolute;
    inset:0;
    border-radius:50%;
    background:radial-gradient(circle, rgba(255,255,255,0.55) 0%, rgba(255,255,255,0) 70%);
    opacity:0;
    animation: breathe 2.6s ease-in-out infinite;
  }

  .hotspot.white .glow{ background:radial-gradient(circle, rgba(220,215,200,0.55) 0%, rgba(220,215,200,0) 70%); }
  .hotspot.white.opened .glow{ animation:none; opacity:0; }

  .hotspot:focus-visible{
    outline: 3px solid var(--lavender-deep);
    outline-offset: 3px;
  }

  @keyframes breathe{
    0%,100%{ opacity:.25; transform:scale(.85); }
    50%{ opacity:.6; transform:scale(1.05); }
  }

  .hotspot.white.opened::after{
    content:"✓";
    position:absolute;
    top:6%;
    right:6%;
    width:20px;
    height:20px;
    border-radius:50%;
    background:var(--lavender);
    color:#fff;
    font-size:11px;
    font-weight:700;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 3px 8px rgba(108,92,168,0.4);
  }

  /* pink rose special states */
  .hotspot.pink .glow{
    background:radial-gradient(circle, rgba(232,131,125,0.0) 0%, rgba(232,131,125,0) 70%);
    animation:none;
  }
  .hotspot.pink.ready .glow{
    background:radial-gradient(circle, rgba(232,131,125,0.65) 0%, rgba(232,131,125,0) 70%);
    animation: breathe-pink 1.8s ease-in-out infinite;
  }
  @keyframes breathe-pink{
    0%,100%{ opacity:.4; transform:scale(.9); }
    50%{ opacity:.85; transform:scale(1.18); }
  }
  .hotspot.pink.locked{ cursor:not-allowed; }
  .hotspot.pink.shake{ animation: shake .45s ease; }
  @keyframes shake{
    0%,100%{ transform:translate(-50%,-50%) rotate(0); }
    25%{ transform:translate(-50%,-50%) rotate(-4deg); }
    75%{ transform:translate(-50%,-50%) rotate(4deg); }
  }

  .hint{
    margin-top:26px;
    font-size:13.5px;
    color:var(--ink-soft);
    text-align:center;
    min-height:20px;
    transition:opacity .3s ease;
  }
  .hint.pink-ready{ color:var(--coral-deep); font-weight:600; }

  /* ---------- Modal ---------- */
  .overlay{
    position:fixed;
    inset:0;
    background:rgba(62,54,44,0.45);
    backdrop-filter:blur(2px);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    opacity:0;
    pointer-events:none;
    transition:opacity .35s ease;
    z-index:50;
  }
  .overlay.show{ opacity:1; pointer-events:auto; }

  .card{
    position:relative;
    background:var(--paper);
    border-radius:26px;
    max-width:400px;
    width:100%;
    padding:38px 30px 30px;
    box-shadow:var(--shadow);
    transform:translateY(18px) scale(.97);
    opacity:0;
    transition:transform .4s cubic-bezier(.2,.8,.2,1), opacity .4s ease;
    text-align:center;
  }
  .overlay.show .card{ transform:translateY(0) scale(1); opacity:1; }

  .card.pink-card{
    background: linear-gradient(180deg, #FFF6F2 0%, var(--paper) 55%);
    border:1px solid rgba(232,131,125,0.25);
  }

  .card .tag{
    font-size:11px;
    letter-spacing:.18em;
    text-transform:uppercase;
    font-weight:600;
    color:var(--lavender-deep);
    margin-bottom:14px;
    display:block;
  }
  .pink-card .tag{ color:var(--coral-deep); }

  .card p.message{
    font-family:'Fraunces', serif;
    font-style:italic;
    font-weight:500;
    font-size:19px;
    line-height:1.55;
    color:var(--ink);
    margin:0;
    white-space:pre-line;
  }
  .pink-card p.message{ font-size:20px; }

  .card .close-btn{
    margin-top:26px;
    border:none;
    background:var(--lavender);
    color:#fff;
    font-family:'Quicksand', sans-serif;
    font-weight:600;
    font-size:14px;
    padding:11px 26px;
    border-radius:999px;
    cursor:pointer;
    transition:transform .2s ease, background .2s ease;
  }
  .card .close-btn:hover{ transform:translateY(-1px); }
  .pink-card .close-btn{ background:var(--coral); }
  .card .close-btn:focus-visible{ outline:3px solid var(--ink); outline-offset:2px; }

  .petal{
    position:absolute;
    top:-10px;
    width:10px;
    height:14px;
    background:var(--coral);
    border-radius:70% 10% 70% 10%;
    opacity:.85;
    animation: fall linear forwards;
  }
  @keyframes fall{
    to{ transform:translateY(420px) rotate(340deg); opacity:0; }
  }

  footer{
    margin-top:40px;
    font-size:12px;
    color:var(--ink-soft);
    opacity:.7;
    text-align:center;
  }

  @media (prefers-reduced-motion: reduce){
    .hotspot .glow, .hotspot.pink.ready .glow, .petal{ animation:none !important; }
    .card, .overlay, .peephole{ transition:none !important; }
  }
</style>
</head>
<body>

  <div class="eyebrow">Para ti</div>
  <h1>Feliz cumpleaños</h1>
  <p class="subtitle" id="subtitleText">Este ramo tiene un mensaje escondido en cada flor.<br>Toca una rosa <strong>blanca</strong> para empezar.</p>

  <div class="progress" id="progress" aria-hidden="true">
    <span class="dot" data-i="0"></span>
    <span class="dot" data-i="1"></span>
    <span class="dot" data-i="2"></span>
    <span class="dot" data-i="3"></span>
    <span class="dot" data-i="4"></span>
  </div>

  <div class="stage" id="stage">
    <img src="bouquet.png" alt="Ramo de flores con rosas blancas, una rosa rosada y lavanda, envuelto en papel amarillo">

    <!-- White rose hotspots -->
    <button class="hotspot white" data-index="0" style="left:46.8%; top:16.5%;" aria-label="Rosa blanca 1">
      <span class="peephole"></span>
      <span class="glow"></span>
    </button>
    <button class="hotspot white" data-index="1" style="left:34.4%; top:42.6%;" aria-label="Rosa blanca 2">
      <span class="peephole"></span>
      <span class="glow"></span>
    </button>
    <button class="hotspot white" data-index="2" style="left:47%; top:37.3%;" aria-label="Rosa blanca 3">
      <span class="peephole"></span>
      <span class="glow"></span>
    </button>
    <button class="hotspot white" data-index="3" style="left:57.6%; top:28.7%;" aria-label="Rosa blanca 4">
      <span class="peephole"></span>
      <span class="glow"></span>
    </button>
    <button class="hotspot white" data-index="4" style="left:81.4%; top:37.5%;" aria-label="Rosa blanca 5">
      <span class="peephole"></span>
      <span class="glow"></span>
    </button>

    <!-- Pink rose -->
    <button class="hotspot pink locked" id="pinkBtn" style="left:64.3%; top:40.7%;" aria-label="Rosa rosada, el mensaje especial">
      <span class="peephole"></span>
      <span class="glow"></span>
    </button>
  </div>

  <p class="hint" id="hintText">5 rosas blancas por descubrir</p>

  <footer>hecho con cariño 🌿</footer>

  <!-- Modal -->
  <div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="cardMessage">
    <div class="card" id="card">
      <span class="tag" id="cardTag">Rosa blanca</span>
      <p class="message" id="cardMessage"></p>
      <button class="close-btn" id="closeBtn">Cerrar</button>
    </div>
  </div>

<script>
  const whiteMessages = [
    "Algo que admiro tanto de ti es cómo tratas a las personas con amabilidad y respeto... y cómo te tratas a ti misma igual. Eso no es común, y en ti se nota siempre.",
    "Cada vez que vamos por el postre de queso en Trujillo se vuelve mi momento favorito cuando te visito. Espero que sigamos yendo muchas veces más.",
    "Hoy solo quiero pedir una cosa: que vivas feliz toda tu vida. Que cada año que cumplas te encuentre así, brillando como seguramente lo estás haciendo hoy.",
    "Esta vez sí me pasé de desocupado, jaja. Ya verás por qué cuando te dé mi regalo especial 👀",
    "Hay algo que le pedí mucho a Dios, y sin decir mucho más... me lo cumplió. Gracias por ser parte de eso."
  ];

  const pinkMessage = "Eres una persona que me hace querer ser mejor. Y no es solo eso — eres alguien que sé que nunca me voy a arrepentir de seguir conociendo. Me encanta que estés en mi vida y lo especial que la haces con solo estar en ella. Le agradezco a Dios haberme puesto en el camino a alguien que me ha cambiado para bien, y te lo agradezco a ti también.\n\nPor eso no quiero parar de conocerte.\n\nHoy solo te deseo mucha felicidad. Vive llena de bendiciones, porque cada cosa buena que te pase te la mereces por completo — y yo siempre, siempre me voy a alegrar por ti.";

  const opened = new Set();
  const stage = document.getElementById('stage');
  const allHotspots = document.querySelectorAll('.hotspot');
  const whiteButtons = document.querySelectorAll('.hotspot.white');
  const pinkBtn = document.getElementById('pinkBtn');
  const overlay = document.getElementById('overlay');
  const card = document.getElementById('card');
  const cardMessage = document.getElementById('cardMessage');
  const cardTag = document.getElementById('cardTag');
  const closeBtn = document.getElementById('closeBtn');
  const hintText = document.getElementById('hintText');
  const dots = document.querySelectorAll('.progress .dot');
  let lastFocused = null;
  let activeHotspot = null;

  // Align each "peephole" so it shows exactly the same pixels of the
  // bouquet photo that sit behind it, so at rest it's invisible, and
  // when lifted it looks like that same rose leaning forward.
  function alignPeepholes(){
    const stageRect = stage.getBoundingClientRect();
    if(stageRect.width === 0) return;
    allHotspots.forEach(btn => {
      const hole = btn.querySelector('.peephole');
      const btnRect = btn.getBoundingClientRect();
      const offsetX = btnRect.left - stageRect.left;
      const offsetY = btnRect.top - stageRect.top;
      hole.style.backgroundImage = "url('bouquet.png')";
      hole.style.backgroundSize = stageRect.width + 'px ' + stageRect.height + 'px';
      hole.style.backgroundPosition = (-offsetX) + 'px ' + (-offsetY) + 'px';
    });
  }
  window.addEventListener('load', alignPeepholes);
  window.addEventListener('resize', () => requestAnimationFrame(alignPeepholes));
  alignPeepholes();
  setTimeout(alignPeepholes, 300); // safety pass after font/layout settle

  function updateHint(){
    const remaining = 5 - opened.size;
    if(remaining > 0){
      hintText.textContent = remaining === 1
        ? "1 rosa blanca por descubrir"
        : `${remaining} rosas blancas por descubrir`;
      hintText.classList.remove('pink-ready');
    } else {
      hintText.textContent = "La rosa rosada está lista para ti ✨";
      hintText.classList.add('pink-ready');
    }
  }

  function openCard(message, isPink, btn){
    lastFocused = document.activeElement;
    cardMessage.textContent = message;
    cardTag.textContent = isPink ? "La rosa rosada" : "Rosa blanca";
    card.classList.toggle('pink-card', isPink);
    overlay.classList.add('show');
    closeBtn.focus();
    if(isPink){ spawnPetals(); }

    activeHotspot = btn;
    requestAnimationFrame(() => btn.classList.add('lifted'));
  }

  function closeCard(){
    overlay.classList.remove('show');
    if(activeHotspot){
      activeHotspot.classList.remove('lifted');
      activeHotspot = null;
    }
    if(lastFocused) lastFocused.focus();
  }

  whiteButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      const i = parseInt(btn.dataset.index, 10);
      if(!opened.has(i)){
        opened.add(i);
        btn.classList.add('opened');
        dots[i].classList.add('filled');
        updateHint();
        if(opened.size === 5){
          pinkBtn.classList.remove('locked');
          pinkBtn.classList.add('ready');
        }
      }
      openCard(whiteMessages[i], false, btn);
    });
  });

  pinkBtn.addEventListener('click', () => {
    if(opened.size < 5){
      pinkBtn.classList.add('shake');
      hintText.textContent = "Descubre primero las 5 rosas blancas 🤍";
      setTimeout(() => pinkBtn.classList.remove('shake'), 450);
      setTimeout(updateHint, 1600);
      return;
    }
    openCard(pinkMessage, true, pinkBtn);
  });

  closeBtn.addEventListener('click', closeCard);
  overlay.addEventListener('click', (e) => {
    if(e.target === overlay) closeCard();
  });
  document.addEventListener('keydown', (e) => {
    if(e.key === 'Escape' && overlay.classList.contains('show')) closeCard();
  });

  function spawnPetals(){
    const stage = card;
    for(let p = 0; p < 10; p++){
      const petal = document.createElement('span');
      petal.className = 'petal';
      petal.style.left = (10 + Math.random() * 80) + '%';
      petal.style.animationDuration = (1.6 + Math.random()*1.2) + 's';
      petal.style.animationDelay = (Math.random()*0.4) + 's';
      stage.appendChild(petal);
      setTimeout(() => petal.remove(), 3200);
    }
  }

  updateHint();
</script>

</body>
</html>
